name: Tests
on:
  push:
    branches:
      - 'main'
  pull_request_target:
    types: [opened, synchronize]
    branches: ['*']
# Acceptance tests from every branch run against one shared FireHydrant org
# with one API key. Concurrent runs trip the org's request rate limit (429s)
# and contend on shared fixtures, so serialize runs repo-wide. New runs queue
# rather than cancel in-flight ones; note GitHub keeps at most one queued run
# per group, so a superseded queued run is marked cancelled and needs a re-run.
concurrency:
  group: acceptance-tests
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Get User Permission
        id: checkAccess
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.triggering_actor }}
      - name: Check User Permission
        if: steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.triggering_actor }} does not have permissions on this repo."
          echo "Current permission level is ${{ steps.checkAccess.outputs.user-permission }}"
          echo "Job originally triggered by ${{ github.actor }}"
          exit 1
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{  github.event.pull_request.head.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      # Install terraform once and point the acceptance-test harness at it.
      # Without TF_ACC_TERRAFORM_PATH, terraform-plugin-sdk downloads its own
      # binary into /tmp at test time, and parallel tests race the download
      # ("text file busy"). terraform_wrapper must stay off so the env var
      # points at the real binary, not the wrapper script.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Point acceptance tests at installed terraform
        run: echo "TF_ACC_TERRAFORM_PATH=$(which terraform)" >> "$GITHUB_ENV"

      - name: Build
        run: make build

      - name: Test
        # -parallel 4 pins test parallelism (default is runner core count);
        # keep in sync with `make testacc`.
        run: go test -v -timeout=25m -parallel 4 ./...
        timeout-minutes: 25
        env:
          TF_ACC: 'true'
          FIREHYDRANT_API_KEY: ${{ secrets.FIREHYDRANT_API_KEY }}
          EXISTING_USER_EMAIL: 'ops+terraform-ci@firehydrant.io'
